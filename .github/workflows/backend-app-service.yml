name: Backend CI/CD - Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/backend-app-service.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Keep only production dependencies
        working-directory: backend
        run: npm prune --omit=dev

      - name: Prepare deploy bundle
        run: |
          mkdir -p backend-deploy
          cp -R backend/dist backend-deploy/dist
          cp -R backend/data backend-deploy/data
          cp backend/package.json backend-deploy/package.json
          cp backend/package-lock.json backend-deploy/package-lock.json
          cp -R backend/node_modules backend-deploy/node_modules

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend-deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
    env:
      AZURE_BACKEND_WEBAPP_NAME: ${{ vars.AZURE_BACKEND_WEBAPP_NAME || 'nba-info' }}

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: backend-package

      - name: Validate Azure deployment configuration
        shell: bash
        run: |
          missing=0
          if [ -z "${{ secrets.AZURE_CREDENTIALS }}" ]; then
            echo "::error::Missing secret AZURE_CREDENTIALS."
            missing=1
          fi
          if [ -z "${AZURE_BACKEND_WEBAPP_NAME}" ]; then
            echo "::error::Missing AZURE_BACKEND_WEBAPP_NAME (repository variable)."
            missing=1
          fi
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi

      - name: Azure login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_BACKEND_WEBAPP_NAME }}
          package: backend-package
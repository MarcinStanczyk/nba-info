name: Backend CI/CD - Azure App Service

on:
  push:
    branches:
      - master
    paths:
      - backend/**
      - .github/workflows/backend-app-service.yml
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: backend
        run: npm ci

      - name: Build backend
        working-directory: backend
        run: npm run build

      - name: Keep only production dependencies
        working-directory: backend
        run: npm prune --omit=dev

      - name: Prepare deploy bundle
        run: |
          mkdir -p backend-deploy
          cp -R backend/dist backend-deploy/dist
          cp backend/package.json backend-deploy/package.json
          cp backend/package-lock.json backend-deploy/package-lock.json
          cp -R backend/node_modules backend-deploy/node_modules

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-package
          path: backend-deploy

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Validate backend app name variable
        env:
          BACKEND_APP_NAME: ${{ vars.AZURE_BACKEND_WEBAPP_NAME }}
        run: |
          if [ -z "$BACKEND_APP_NAME" ]; then
            echo "Missing repository variable: AZURE_BACKEND_WEBAPP_NAME"
            exit 1
          fi

      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-package
          path: backend-package

      - name: Deploy backend to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_BACKEND_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE_BACKEND }}
          package: backend-package/backend-deploy
